name: supply-chain
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  vet:
    runs-on: ubuntu-latest
    permissions:            # job-scoped, NOT workflow-level — keeps write perms off the other jobs
      contents: read
      pull-requests: write     # vet-action comments findings on the PR
      issues: write            # required by vet-action's comment client
    steps:
      # harden-runner: n/a — opted out
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: vet CVE gate
        uses: safedep/vet-action@6247cccd1b6683a27946ea3a0d45d3865346918b # v1.1.12
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Octokit auth — action fails without it
        with:
          policy: .github/vet/policy.yml
          # cloud-key / cloud-tenant: add as repo secrets for Insights v2 +
          # active malware analysis. Omit → community Insights (CVE + known-
          # malicious for public packages work; degrades silently otherwise).
  guarddog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: guarddog manifest verify (npm)
        # Blocking gate, human-readable: --exit-non-zero-on-finding fails the
        # job the instant a heuristic fires; default (text) output prints the
        # findings to the CI log. No SARIF/Security-tab upload (see skill notes).
        # Targets package.json (declared deps), NOT a lockfile.
        # METADATA ALLOWLIST (-r): medium+ registry-metadata rules only. Skips the
        # per-dep SOURCE semgrep (downloads + semgreps every dep tarball, ~90s+) —
        # vet's known-malicious DB covers that ground. npm_metadata_mismatch dropped
        # (FP-prone). To trade speed for depth in CI, drop the -r flags for a full scan.
        run: uvx guarddog npm verify package.json -r typosquatting -r potentially_compromised_email_domain -r unclaimed_maintainer_email_domain -r deceptive_author --exit-non-zero-on-finding
  socket-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: corepack enable   # provides the pnpm/yarn pinned by packageManager; harmless for npm
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      # Install the resolved tree THROUGH Socket so every transitive package
      # meets the behavioral feed. NO store-cache restore — a fresh Dependabot
      # tree must be FETCHED to be filtered. min-age forced to 0 so a too-fresh
      # transitive can't FAIL the job (Socket blocking malicious is age-independent).
      - run: sfw npm ci
        env:
          npm_config_min_release_age: "0"
