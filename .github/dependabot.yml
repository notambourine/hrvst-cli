version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: "0 9 * * 1,3"
      timezone: America/Chicago
    cooldown:
      default-days: 3
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: cron
      cronjob: "0 9 * * 1,3"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # majors are unmatched by any group -> individual PRs (one branch each)
